name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: pytest (Python 3.11, locked)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.11"
          enable-cache: true

      - name: Install the locked environment
        run: uv sync --locked --extra engine --extra dev

      - name: Test
        run: uv run --locked pytest -q

  # The thesis, asserted in CI. Not "the tests pass" — the GATE behaves as claimed.
  #
  #   Claude proposes -> a human confirms once -> arithmetic decides.
  #
  # `fixtures/confounding_alias` is an unarguable blocker: processing_run is perfectly
  # aliased with culture_condition, so the condition effect is NOT ESTIMABLE (R² = 1,
  # rank-deficient design matrix). No model can separate it. That must exit 1 — but only
  # AFTER a human ratifies the design. Before ratification it must exit 0.
  gate:
    name: the gate does what the README says
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.11"
          enable-cache: true
      - name: Install the locked environment
        run: uv sync --locked --extra engine

      - name: Nothing blocks before a human confirms  (expect exit 0)
        run: |
          cp -r fixtures/confounding_alias "$RUNNER_TEMP/unconfirmed"
          uv run --locked python - "$RUNNER_TEMP/unconfirmed/sc-referee.yaml" <<'PY'
          import sys, yaml, pathlib
          p = pathlib.Path(sys.argv[1])
          cfg = yaml.safe_load(p.read_text())
          cfg["confirmed_by_human"] = False
          p.write_text(yaml.safe_dump(cfg, sort_keys=False))
          PY
          set +e
          uv run --locked python -m sc_referee.cli audit "$RUNNER_TEMP/unconfirmed" \
            --design "$RUNNER_TEMP/unconfirmed/sc-referee.yaml"
          code=$?
          set -e
          test $code -eq 0 || { echo "::error::unconfirmed design exited $code, expected 0 — a blocker escaped before human ratification"; exit 1; }

      - name: A ratified, non-estimable design blocks  (expect exit 1)
        run: |
          set +e
          uv run --locked python -m sc_referee.cli audit fixtures/confounding_alias \
            --design fixtures/confounding_alias/sc-referee.yaml \
            --json "$RUNNER_TEMP/report.json" --md "$RUNNER_TEMP/report.md"
          code=$?
          set -e
          test $code -eq 1 || { echo "::error::confounded fixture exited $code, expected 1 (blocker)"; exit 1; }

      - name: A typo in the YAML is a config error, never a scientific verdict  (expect exit 2)
        run: |
          cp -r fixtures/confounding_alias "$RUNNER_TEMP/typo"
          uv run --locked python - "$RUNNER_TEMP/typo/sc-referee.yaml" <<'PY'
          import sys, yaml, pathlib
          p = pathlib.Path(sys.argv[1])
          cfg = yaml.safe_load(p.read_text())
          cfg["contrasts"][0]["reference"] = "control"   # the level is spelled `ctrl`
          p.write_text(yaml.safe_dump(cfg, sort_keys=False))
          PY
          set +e
          uv run --locked python -m sc_referee.cli audit "$RUNNER_TEMP/typo" --design "$RUNNER_TEMP/typo/sc-referee.yaml"
          code=$?
          set -e
          test $code -eq 2 || { echo "::error::YAML typo exited $code, expected 2 — a config error was reported as science"; exit 1; }

      - name: The report is strict JSON (no bare Infinity)
        run: uv run --locked python -c "import json,os,sys; json.loads(open(os.environ['RUNNER_TEMP']+'/report.json').read()); print('strict JSON ok')"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sc-referee-report
          path: ${{ runner.temp }}/report.*
