questions:
- group: Measurement
  prompt: Is the HBB column a genuine measurement of ambient-RNA contamination in
    these cells?
  why: Referee would treat this column as the contamination signal; if it is not a
    real ambient measurement, a confounding check on it would be meaningless.
  default: 'yes'
- group: Timing
  prompt: Was that contamination present before genotype — that is, it is not a downstream
    consequence of genotype?
  why: Contamination caused by genotype would be a mediator, not a confounder, and
    must not be adjusted for.
  default: 'yes'
- group: Estimand
  prompt: For the effect this analysis targets, is adjusting for ambient-RNA contamination
    a required part of the design?
  why: Whether the contamination basis must appear in the fitted design depends on
    the estimand you are after.
  default: 'yes'
- group: Authority
  prompt: Do you have the scientific authority to confirm this measurement and its
    causal scope?
  why: Referee will only ratify a confounding premise a qualified person stands behind.
  default: 'yes'
